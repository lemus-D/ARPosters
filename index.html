<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR Poster</title>
    <style>
      html, body { margin: 0; padding: 0; background: #111; }
      #message {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        color: #9aa3b2;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1rem; text-align: center; padding: 2rem; gap: 12px;
      }
      #message h2 { color: #e8ecf1; margin: 0; font-size: 1.2rem; }
      #message a { color: #5b9cff; }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>AR Poster not configured yet</h2>
      <p>Open <a href="admin.html">admin.html</a>, set up your targets and display assets,<br />
      then click <strong>Save &amp; Generate Viewer</strong> to replace this file.</p>
    </div>
  </body>
</html>
